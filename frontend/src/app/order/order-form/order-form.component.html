<div class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-900 font-['Poppins'] mb-6">Place an Order</h2>

    @if (successMessage) {
      <div class="mb-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-700 text-sm">
        {{ successMessage }}
      </div>
    }

    @if (errorMessage) {
      <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
        {{ errorMessage }}
      </div>
    }

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Product ID</label>
        <input
          type="number"
          [(ngModel)]="order.productId"
          name="productId"
          placeholder="Enter product ID"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
        <input
          type="number"
          [(ngModel)]="order.quantity"
          name="quantity"
          min="1"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button
        (click)="submitOrder()"
        [disabled]="loading"
        class="w-full bg-[#1E3A8A] text-white py-3 rounded-xl font-semibold text-sm hover:bg-blue-800 transition-colors disabled:opacity-50"
      >
        {{ loading ? 'Processing...' : 'Confirm Order' }}
      </button>

      <button
        (click)="goToOrders()"
        class="w-full border border-gray-300 text-gray-600 py-3 rounded-xl font-semibold text-sm hover:bg-gray-50 transition-colors"
      >
        View My Orders
      </button>
    </div>
  </div>
</div>
