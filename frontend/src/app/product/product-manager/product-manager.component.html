<div class="p-6 md:p-10 lg:p-16 max-w-7xl mx-auto space-y-12">
  <div class="flex flex-col md:flex-row justify-between items-center gap-6">
    <h1 class="text-3xl font-bold text-gray-900 font-['Poppins']">Product Management</h1>
    <button (click)="onAddNew()" class="myshop-btn-primary px-4 py-2 text-sm">Add New Product</button>
  </div>

  <!-- Product Form -->
  <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 max-w-2xl mx-auto" *ngIf="showForm">
    <h2 class="text-xl font-semibold mb-6 text-[#1E3A8A]">{{ isEditing ? 'Edit Product' : 'Add New Product' }}</h2>
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Product Name</label>
        <input type="text" formControlName="name"
          class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-[#1E3A8A] focus:ring-[#1E3A8A] sm:text-sm p-2 border">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Description</label>
        <textarea formControlName="description"
          class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-[#1E3A8A] focus:ring-[#1E3A8A] sm:text-sm p-2 border"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Price (TND)</label>
        <input type="number" formControlName="price"
          class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-[#1E3A8A] focus:ring-[#1E3A8A] sm:text-sm p-2 border">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Image URL</label>
        <input type="text" formControlName="urlImg"
          class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-[#1E3A8A] focus:ring-[#1E3A8A] sm:text-sm p-2 border"
          placeholder="https://...">
      </div>
      <div class="flex gap-4 pt-4">
        <button type="submit" [disabled]="!productForm.valid" class="myshop-btn-primary flex-1">{{ isEditing ? 'Update'
          : 'Save' }} Product</button>
        <button type="button" (click)="resetForm()"
          class="bg-gray-100 text-gray-700 px-6 py-2 rounded-xl font-medium hover:bg-gray-200 transition-all flex-1">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Product Table -->
  <div class="overflow-hidden bg-white shadow-xl rounded-2xl border border-gray-100">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Product</th>
          <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Price</th>
          <th class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let product of products" class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4">
            <div class="flex items-center gap-4">
              <img [src]="product.urlImg" alt="" class="w-12 h-12 rounded-lg object-cover shadow-sm">
              <div>
                <div class="text-sm font-bold text-gray-900">{{ product.name }}</div>
                <div class="text-xs text-gray-500 truncate max-w-xs">{{ product.description }}</div>
              </div>
            </div>
          </td>
          <td class="px-6 py-4 text-sm font-semibold text-[#06B6D4]">{{ product.price }} TND</td>
          <td class="px-6 py-4 text-right text-sm space-x-3">
            <button (click)="onEdit(product)" class="text-[#1E3A8A] hover:underline font-medium">Edit</button>
            <button (click)="onDelete(product.id)" class="text-red-600 hover:underline font-medium">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
