<main class="min-h-screen bg-[#f8fafc] py-12">
  <div class="max-w-3xl mx-auto px-6">

    <a routerLink="/forum"
      class="group inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-[#1E3A8A] mb-8 transition-all uppercase tracking-widest">
      <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
        viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Retour au Forum
    </a>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-12">
      <div class="p-8 md:p-12">
        <div class="mb-10">
          <h1 class="text-3xl font-bold text-slate-900 mb-2">Nouvelle Discussion</h1>
          <p class="text-slate-500 text-sm">Partagez vos idées ou vos questions avec la communauté.</p>
        </div>

        <form (ngSubmit)="submit()" class="space-y-8">
          @if (error) {
          <div
            class="bg-red-50 border border-red-100 text-red-600 px-5 py-3 rounded-xl text-xs font-bold animate-pulse">
            {{ error }}
          </div>
          }

          <div class="space-y-2">
            <label for="title" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Sujet
              de la discussion</label>
            <input id="title" type="text" [(ngModel)]="title" name="title"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-slate-900 font-semibold placeholder-slate-400 focus:ring-2 focus:ring-[#1E3A8A]/10 focus:border-[#1E3A8A] outline-none transition-all"
              placeholder="Soyez précis pour obtenir de meilleures réponses..." maxlength="200" />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label for="category"
                class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Catégorie</label>
              <div class="relative">
                <select id="category" [(ngModel)]="categoryId" name="categoryId"
                  class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-slate-700 font-semibold focus:ring-2 focus:ring-[#1E3A8A]/10 focus:border-[#1E3A8A] outline-none transition-all cursor-pointer">
                  @for (cat of categories; track cat.id) {
                  <option [value]="cat.id">{{ cat.name }}</option>
                  }
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
            </div>
            <div class="flex items-center pt-6">
              <div class="p-4 bg-blue-50/50 rounded-xl border border-blue-50 flex gap-4 items-center">
                <span class="text-xl">💡</span>
                <p class="text-[10px] text-[#1E3A8A] font-bold leading-tight">Une catégorie bien choisie aide les
                  experts à trouver votre post.</p>
              </div>
            </div>
          </div>

          <div class="space-y-2">
            <label for="content"
              class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Message détaillé</label>
            <textarea id="content" [(ngModel)]="content" name="content" rows="8"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-slate-600 font-medium placeholder-slate-400 focus:ring-2 focus:ring-[#1E3A8A]/10 focus:border-[#1E3A8A] outline-none transition-all resize-none"
              placeholder="Expliquez votre point de vue ou détaillez votre question..."></textarea>
          </div>

          <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-slate-50">
            <button type="submit" [disabled]="submitting"
              class="flex-1 bg-[#1E3A8A] hover:bg-[#1E2E5E] text-white px-8 py-4 rounded-xl font-bold transition-all disabled:opacity-30 shadow-sm">
              {{ submitting ? 'Publication...' : 'Publier maintenant' }}
            </button>
            <a routerLink="/forum"
              class="px-8 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-all text-center text-sm">
              Annuler
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
