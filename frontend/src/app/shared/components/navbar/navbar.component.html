<header>
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto px-4 py-3">
      <a routerLink="/" class="flex items-center gap-2">
        <span class="font-bold text-xl text-[#1E3A8A] font-['Poppins']">My</span>
        <span class="font-bold text-xl text-[#06B6D4] font-['Poppins']">Shop</span>
      </a>
      <div class="flex items-center gap-2 md:order-2 rtl:space-x-reverse">
        <button
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200">
          <svg fill="currentColor" class="size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path
              d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" />
          </svg>
        </button>
        <a role="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-[#1E3A8A]/20"
          routerLink="/cart">
          <svg fill="currentColor" class="size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
            <path
              d="M0 24C0 10.7 10.7 0 24 0L69.5 0c22 0 41.5 12.8 50.6 32l411 0c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3l-288.5 0 5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5L488 336c13.3 0 24 10.7 24 24s-10.7 24-24 24l-288.3 0c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5L24 48C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z" />
          </svg>
        </a>

        <!-- Auth buttons : non connecté -->
        <ng-container *ngIf="!isLoggedIn">
          <button
            (click)="login()"
            class="hidden md:inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-[#1E3A8A] border border-[#1E3A8A] rounded-lg hover:bg-[#1E3A8A] hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-[#1E3A8A]/40">
            <svg class="size-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M18 12H9m0 0l3-3m-3 3l3 3" />
            </svg>
            Sign In
          </button>
          <button
            (click)="register()"
            class="hidden md:inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-[#06B6D4] rounded-lg hover:bg-[#0891b2] transition-colors focus:outline-none focus:ring-2 focus:ring-[#06B6D4]/40">
            <svg class="size-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
            </svg>
            Register
          </button>
        </ng-container>

        <!-- Utilisateur connecté -->
        <ng-container *ngIf="isLoggedIn">
          <div class="hidden md:flex items-center gap-2">
            <span class="text-sm text-gray-600 font-medium">{{ username }}</span>
            <button
              (click)="logout()"
              class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-red-600 border border-red-300 rounded-lg hover:bg-red-50 transition-colors focus:outline-none focus:ring-2 focus:ring-red-200">
              <svg class="size-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M18 12l-3-3m0 0l-3 3m3-3H9" />
              </svg>
              Logout
            </button>
          </div>
        </ng-container>

        <button data-collapse-toggle="navbar" type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200"
          aria-controls="navbar" aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M1 1h15M1 7h15M1 13h15" />
          </svg>
        </button>
      </div>
      <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar">
        <ul
          class="flex flex-col p-4 md:p-0 mt-4 font-medium border border-gray-100 rounded-xl bg-gray-50 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-transparent">
          <li>
            <a routerLink="/"
              class="block py-2 px-3 text-gray-700 rounded-lg hover:bg-gray-100 md:hover:bg-transparent md:hover:text-[#1E3A8A] md:p-0 transition-colors"
              aria-current="page">Home</a>
          </li>
          <li>
            <a routerLink="/"
              class="block py-2 px-3 text-gray-700 rounded-lg hover:bg-gray-100 md:hover:bg-transparent md:hover:text-[#1E3A8A] md:p-0 transition-colors">Products</a>
          </li>
          <li>
            <a routerLink="/admin"
              class="block py-2 px-3 text-gray-700 rounded-lg hover:bg-gray-100 md:hover:bg-transparent md:hover:text-[#06B6D4] md:p-0 transition-colors">Sell
              on MyShop</a>
          </li>
          <li>
            <a
              routerLink="/forum"
              class="block py-2 px-3 text-gray-700 rounded-lg hover:bg-gray-100 md:hover:bg-transparent md:hover:text-[#1E3A8A] md:p-0 transition-colors"
              >Forum</a
            >
          </li>
          <li>
            <a
              routerLink="/events"
              class="block py-2 px-3 text-gray-700 rounded-lg hover:bg-gray-100 md:hover:bg-transparent md:hover:text-[#1E3A8A] md:p-0 transition-colors"
              >Events</a
            >
          </li>
          <!-- Mobile auth buttons -->
          <li *ngIf="!isLoggedIn" class="flex flex-col gap-2 pt-2 border-t border-gray-200 md:hidden">
            <button
              (click)="login()"
              class="w-full text-left py-2 px-3 text-[#1E3A8A] font-medium rounded-lg hover:bg-gray-100 transition-colors">
              Sign In
            </button>
            <button
              (click)="register()"
              class="w-full text-left py-2 px-3 text-[#06B6D4] font-medium rounded-lg hover:bg-gray-100 transition-colors">
              Register
            </button>
          </li>
          <li *ngIf="isLoggedIn" class="flex flex-col gap-1 pt-2 border-t border-gray-200 md:hidden">
            <span class="py-2 px-3 text-sm text-gray-500">{{ username }}</span>
            <button
              (click)="logout()"
              class="w-full text-left py-2 px-3 text-red-600 font-medium rounded-lg hover:bg-red-50 transition-colors">
              Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
