<main class="p-6 md:p-10 lg:p-16">
  <section class="grid place-content-center lg:grid-cols-2 gap-8 lg:gap-12 lg:py-24">

    <!-- LEFT: Hero Text -->
    <article class="flex flex-col max-w-xl mx-auto gap-4">
      <h1 class="text-gray-900 font-bold text-4xl sm:text-5xl lg:text-6xl font-['Poppins'] leading-tight">
        Discover Thousands of Products
      </h1>
      <p class="text-lg md:text-xl text-gray-500 leading-relaxed">
        Shop from independent sellers. Electronics, fashion, home & more. Your modern marketplace awaits.
      </p>

      <!-- Boutons -->
      <div class="flex gap-3 flex-wrap">

        <!-- Browse Products -->
        <button
          routerLink="/order/new"
          class="myshop-btn-primary w-fit px-6 py-3 text-base"
        >
          Browse Products
        </button>

        <!-- My Cart -->
        <button
          routerLink="/cart"
          class="flex items-center gap-2 w-fit px-6 py-3 text-base font-semibold rounded-xl border-2 border-[#1E3A8A] text-[#1E3A8A] hover:bg-[#1E3A8A] hover:text-white transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
          </svg>
          My Cart
        </button>

        <!-- My Orders -->
        <button
          routerLink="/orders"
          class="flex items-center gap-2 w-fit px-6 py-3 text-base font-semibold rounded-xl border-2 border-green-600 text-green-600 hover:bg-green-600 hover:text-white transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
          </svg>
          My Orders
        </button>

      </div>
    </article>

    <!-- RIGHT: Carousel -->
    <article
      id="controls-carousel"
      class="relative w-full max-w-screen-sm mx-auto"
      data-carousel="static"
    >
      <div class="relative h-56 overflow-hidden rounded-2xl sm:h-96 shadow-lg">
        @for (productOffer of productOffers$ | async; track productOffer.id) {
          <div
            class="mt-8 sm:mt-28 lg:mt-24 hidden duration-700 ease-in-out"
            data-carousel-item
          >
            <app-product-offer [product]="productOffer" />
          </div>
        }
      </div>

      <!-- Prev Button -->
      <button
        type="button"
        class="absolute top-0 start-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none"
        data-carousel-prev
      >
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-[#1E3A8A]/90 group-hover:bg-[#1E3A8A] group-focus:ring-4 group-focus:ring-[#1E3A8A]/30 group-focus:outline-none transition-colors">
          <svg class="w-4 h-4 text-white rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 1 1 5l4 4"/>
          </svg>
          <span class="sr-only">Previous</span>
        </span>
      </button>

      <!-- Next Button -->
      <button
        type="button"
        class="absolute top-0 end-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none"
        data-carousel-next
      >
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-[#1E3A8A]/90 group-hover:bg-[#1E3A8A] group-focus:ring-4 group-focus:ring-[#1E3A8A]/30 group-focus:outline-none transition-colors">
          <svg class="w-4 h-4 text-white rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
          </svg>
          <span class="sr-only">Next</span>
        </span>
      </button>
    </article>

  </section>

  <!-- Products Grid -->
  <section class="my-12 md:my-16 space-y-8 w-full">
    <h2 class="text-center font-bold text-gray-900 text-3xl sm:text-4xl font-['Poppins']">
      Pick Your Favorite Product
    </h2>
    <article class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (product of products$ | async; track product.id) {
        <app-home-product [product]="product" />
      }
    </article>
  </section>
</main>
