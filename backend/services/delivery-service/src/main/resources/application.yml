server:
  port: 8085

spring:
  application:
    name: delivery-service
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  profiles:
    active: mysql

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
