<main class="min-h-screen bg-gray-50 py-6">
  <div class="max-w-2xl mx-auto px-4">
    <a routerLink="/forum" class="inline-flex items-center gap-2 text-sm text-gray-600 hover:text-[#1E3A8A] mb-6 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Retour au forum
    </a>

    <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
      <h1 class="font-bold text-xl text-gray-900 mb-6">Nouveau post</h1>

      <form (ngSubmit)="submit()" class="space-y-4">
        @if (error) {
          <p class="text-red-600 text-sm">{{ error }}</p>
        }
        <div>
          <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
          <input
            id="title"
            type="text"
            [(ngModel)]="title"
            name="title"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1E3A8A]/20 focus:border-[#1E3A8A] outline-none"
            placeholder="Titre de votre discussion"
            maxlength="200"
          />
        </div>
        <div>
          <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
          <select
            id="category"
            [(ngModel)]="categoryId"
            name="categoryId"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1E3A8A]/20 focus:border-[#1E3A8A] outline-none"
          >
            @for (cat of categories; track cat.id) {
              <option [value]="cat.id">{{ cat.name }}</option>
            }
          </select>
        </div>
        <div>
          <label for="content" class="block text-sm font-medium text-gray-700 mb-1">Contenu</label>
          <textarea
            id="content"
            [(ngModel)]="content"
            name="content"
            rows="6"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#1E3A8A]/20 focus:border-[#1E3A8A] outline-none resize-y"
            placeholder="Décrivez votre question ou sujet..."
          ></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button
            type="submit"
            [disabled]="submitting"
            class="myshop-btn-primary px-6 py-2.5 disabled:opacity-50"
          >
            {{ submitting ? 'Publication...' : 'Publier' }}
          </button>
          <a routerLink="/forum" class="px-6 py-2.5 border border-gray-300 rounded-xl text-gray-700 hover:bg-gray-50 transition-colors inline-block">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</main>
